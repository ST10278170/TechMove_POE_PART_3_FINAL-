version: '3.8'

services:
  sql-server-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sql-server-db
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourStrongPassword123!
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql
    networks:
      - glms-network

  glms-backend-api:
    image: glms-backend-api
    container_name: glms-backend-api
    build:
      context: .
      dockerfile: TechMove.GLMS.API/Dockerfile
    environment:
      - ConnectionStrings__DefaultConnection=Server=sql-server-db;Database=TechMoveGLMS;User Id=sa;Password=YourStrongPassword123!;Encrypt=False;TrustServerCertificate=True;
      - ASPNETCORE_ENVIRONMENT=Development
    ports:
      - "7038:8080"
    depends_on:
      - sql-server-db
    networks:
      - glms-network

  glms-frontend-web:
    image: glms-frontend-web
    container_name: glms-frontend-web
    build:
      context: .
      dockerfile: TechMove.GLMS/Dockerfile
    environment:
      - ApiSettings__BaseAddress=http://glms-backend-api:8080/
      - ASPNETCORE_ENVIRONMENT=Development
    ports:
      - "5274:8080"
    depends_on:
      - glms-backend-api
    networks:
      - glms-network

networks:
  glms-network:
    driver: bridge

volumes:
  mssql-data:
